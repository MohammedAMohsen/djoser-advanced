          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomUserUpdate'
          description: ''
    delete:
      operationId: auth_users_me_destroy
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
